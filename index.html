<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme')
          var resolved =
            stored === 'light' || stored === 'dark'
              ? stored
              : matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
          document.documentElement.dataset.theme = resolved
          var meta = document.querySelector('meta[name="theme-color"]')
          if (meta) meta.setAttribute('content', resolved === 'dark' ? '#16171d' : '#ffffff')
        } catch (e) {
          /* localStorage unavailable — falls back to OS preference */
        }
      })()
    </script>
    <meta name="theme-color" content="#16171d" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>लेख · Lekh — Nepali typing</title>
    <meta
      name="description"
      content="Type Nepali the way you already text it. Romanized-to-Devanagari transliteration, a full script cheat sheet, and a camera scanner that reads Nepali or English documents and translates them — runs entirely in your browser."
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
